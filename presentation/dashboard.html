<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivWatch v3.0 • RF Observability</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: #00ff9f; font-family: 'Courier New', monospace; }
        canvas { border: 1px solid #00ff9f; }
        .matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.15; }
        .alert { animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body class="min-h-screen p-4">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6 border-b border-green-500 pb-4">
            <div>
                <h1 class="text-4xl font-bold tracking-widest">CIVWATCH<span class="text-red-500">V3</span></h1>
                <p class="text-sm text-green-400">UNIFIED RF OBSERVABILITY PLATFORM • LIVE</p>
            </div>
            <div class="flex gap-8 text-sm">
                <div>Threat Score: <span id="threat-score" class="text-2xl font-bold text-yellow-400">42</span></div>
                <div>Sensors: <span id="sensor-count" class="text-emerald-400">3</span></div>
                <div>Domains: <span class="text-cyan-400">CELL • WIFI • D2D • TRANSPORT</span></div>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-4">
            <!-- Topology Canvas -->
            <div class="col-span-8 bg-black/50 border border-green-500/50 p-4 rounded">
                <h2 class="text-xl mb-2">RELATIVE SPATIAL TOPOLOGY</h2>
                <canvas id="topology" width="800" height="500" class="w-full"></canvas>
            </div>

            <!-- Side Panels -->
            <div class="col-span-4 space-y-4">
                <!-- Current Status -->
                <div class="bg-black/50 border border-green-500/50 p-4 rounded">
                    <h3 class="text-lg mb-3">LIVE DOMAIN STATUS</h3>
                    <div id="domains" class="space-y-2"></div>
                </div>

                <!-- Alerts -->
                <div class="bg-black/50 border border-red-500/50 p-4 rounded alert">
                    <h3 class="text-lg mb-3 text-red-400">ACTIVE FLAGS</h3>
                    <div id="flags" class="space-y-1 text-sm"></div>
                </div>
            </div>
        </div>

        <!-- Timeline -->
        <div class="mt-6 bg-black/50 border border-green-500/50 p-4 rounded">
            <h3 class="text-lg mb-3">EVENT TIMELINE</h3>
            <div id="timeline" class="space-y-2 max-h-64 overflow-y-auto text-sm font-mono"></div>
        </div>
    </div>

    <canvas id="matrix" class="matrix"></canvas>

    <script>
        // Matrix Rain
        const matrixCanvas = document.getElementById('matrix');
        const mctx = matrixCanvas.getContext('2d');
        matrixCanvas.height = window.innerHeight;
        matrixCanvas.width = window.innerWidth;
        const chars = '01アイウエオカキクケコ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const fontSize = 14;
        const columns = matrixCanvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            mctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
            mctx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
            mctx.fillStyle = '#00ff9f';
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                mctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > matrixCanvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);

        // WebSocket
        const ws = new WebSocket('ws://localhost:8000/ws');
        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            updateUI(data);
        };

        function updateUI(data) {
            document.getElementById('threat-score').textContent = data.score || 42;
            document.getElementById('sensor-count').textContent = data.sensor_id ? '1+' : '3';

            // Domain status
            const domainsDiv = document.getElementById('domains');
            domainsDiv.innerHTML = `
                <div class="flex justify-between"><span class="text-cyan-400">CELLULAR</span><span class="${data.domain === 'cellular' ? 'text-green-400' : 'text-gray-500'}">● LIVE</span></div>
                <div class="flex justify-between"><span class="text-purple-400">WI-FI</span><span class="text-green-400">● LIVE</span></div>
                <div class="flex justify-between"><span class="text-orange-400">D2D</span><span class="text-green-400">● LIVE</span></div>
                <div class="flex justify-between"><span class="text-pink-400">TRANSPORT</span><span class="text-green-400">● LIVE</span></div>
            `;

            // Flags
            const flagsDiv = document.getElementById('flags');
            flagsDiv.innerHTML = (data.flags || []).map(f => `<div class="text-red-400">⚠ ${f}</div>`).join('');

            // Timeline
            const timeline = document.getElementById('timeline');
            const entry = document.createElement('div');
            entry.className = 'flex justify-between border-l-2 border-green-500 pl-3 py-1';
            entry.innerHTML = `<span class="text-green-300">${new Date().toLocaleTimeString()}</span> <span class="text-yellow-400">${data.flags ? data.flags.join(', ') : 'Observation normal'}</span> <span class="text-cyan-400">${data.domain || 'multi'}</span>`;
            timeline.appendChild(entry);
            if (timeline.children.length > 20) timeline.removeChild(timeline.children[0]);

            // Trigger topology update
            if (window.updateTopology) window.updateTopology(data);
        }

        // Enhanced Topology Demo
        const canvas = document.getElementById('topology');
        const ctx = canvas.getContext('2d');
        let nodes = [];
        
        function createNode(x, y, label, strength) {
            return {x, y, label, strength, vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2};
        }
        
        nodes = [
            createNode(200, 150, "CELL", 0.9),
            createNode(500, 200, "WIFI", 0.75),
            createNode(350, 350, "D2D", 0.6),
            createNode(600, 280, "TRANSPORT", 0.85)
        ];
        
        function animateTopology() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw connections
            ctx.strokeStyle = '#00ff9f';
            ctx.lineWidth = 1.5;
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i+1; j < nodes.length; j++) {
                    ctx.beginPath();
                    ctx.moveTo(nodes[i].x, nodes[i].y);
                    ctx.lineTo(nodes[j].x, nodes[j].y);
                    ctx.stroke();
                }
            }
            
            // Draw nodes
            for (let node of nodes) {
                // Glow
                ctx.fillStyle = `rgba(0, 255, 159, ${node.strength})`;
                ctx.beginPath();
                ctx.arc(node.x, node.y, 18, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#000';
                ctx.font = 'bold 12px Courier';
                ctx.textAlign = 'center';
                ctx.fillText(node.label, node.x, node.y + 5);
                
                // Movement
                node.x += node.vx;
                node.y += node.vy;
                if (node.x < 30 || node.x > canvas.width - 30) node.vx *= -1;
                if (node.y < 30 || node.y > canvas.height - 30) node.vy *= -1;
            }
            
            requestAnimationFrame(animateTopology);
        }
        animateTopology();
    </script>
</body>
</html>
